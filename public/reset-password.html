<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — Wellflow</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#7B3F5E;--accent-light:#F2E8ED;--cream:#FAF6F5;--white:#FFFFFF;
  --text:#0A0A0A;--text-soft:#8A8080;--border:#EDE5E4;--radius:14px;--radius-sm:8px;
}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
.brand{font-family:'Cormorant Garamond',serif;font-size:1.75rem;color:var(--text);margin-bottom:2rem;text-align:center;}
.brand em{font-style:italic;color:var(--accent);}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;width:100%;max-width:400px;box-shadow:0 2px 16px rgba(0,0,0,0.06);}
.title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;margin-bottom:6px;font-weight:400;}
.sub{font-size:13px;color:var(--text-soft);margin-bottom:1.5rem;}
.form-field{margin-bottom:14px;}
.form-field label{display:block;font-size:11px;color:var(--text-soft);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px;}
.form-field input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:'Jost',sans-serif;color:var(--text);background:var(--cream);}
.form-field input:focus{outline:none;border-color:var(--accent);}
.error{font-size:12px;color:var(--accent);margin-top:10px;min-height:18px;}
.btn{width:100%;padding:12px;background:var(--text);color:var(--white);border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:500;font-family:'Jost',sans-serif;cursor:pointer;margin-top:8px;transition:background 0.15s;}
.btn:hover{background:#222;}
.btn:disabled{background:#ccc;cursor:not-allowed;}
.success{display:none;text-align:center;padding:1rem 0;}
.success p{font-size:14px;color:var(--text-soft);margin-bottom:1.25rem;line-height:1.6;}
.back{display:inline-block;font-size:13px;color:var(--accent);text-decoration:none;}
.back:hover{text-decoration:underline;}
.invalid{text-align:center;padding:1rem 0;}
.invalid p{font-size:14px;color:var(--text-soft);margin-bottom:1.25rem;line-height:1.6;}
</style>
</head>
<body>

<div class="brand">well<em>flow</em></div>

<div class="card">
  <div id="formView">
    <div class="title">Set new password</div>
    <div class="sub">Choose a new password for your account.</div>
    <div class="form-field"><label>New password</label><input type="password" id="newPassword" placeholder="At least 8 characters" /></div>
    <div class="form-field"><label>Confirm password</label><input type="password" id="confirmPassword" placeholder="Repeat your password" /></div>
    <div class="error" id="formError"></div>
    <button class="btn" id="submitBtn" onclick="handleReset()">Set new password</button>
  </div>

  <div class="success" id="successView">
    <p>Your password has been updated. You can now log in with your new password.</p>
    <a href="/" class="back">Go to log in</a>
  </div>

  <div class="invalid" id="invalidView" style="display:none;">
    <p>This reset link is invalid or has expired.</p>
    <a href="/" class="back">Request a new one</a>
  </div>
</div>

<script>
const token = new URLSearchParams(window.location.search).get('token');

if (!token) {
  document.getElementById('formView').style.display = 'none';
  document.getElementById('invalidView').style.display = 'block';
}

async function handleReset() {
  const password = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  const err = document.getElementById('formError');
  const btn = document.getElementById('submitBtn');

  if (!password || !confirm) { err.textContent = 'Please fill in both fields.'; return; }
  if (password.length < 8) { err.textContent = 'Password must be at least 8 characters.'; return; }
  if (password !== confirm) { err.textContent = 'Passwords don\'t match.'; return; }

  err.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    const res = await fetch('/api/auth/reset-confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });
    const data = await res.json();
    if (!res.ok) {
      err.textContent = data.error || 'Something went wrong.';
      btn.disabled = false;
      btn.textContent = 'Set new password';
      return;
    }
    document.getElementById('formView').style.display = 'none';
    document.getElementById('successView').style.display = 'block';
  } catch(e) {
    err.textContent = 'Something went wrong. Please try again.';
    btn.disabled = false;
    btn.textContent = 'Set new password';
  }
}
</script>
</body>
</html>
